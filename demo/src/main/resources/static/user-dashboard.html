<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Corda 用户工作台 - 多节点管理</title>
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; --light: #f8f9fa; --danger: #e74c3c; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #e8f5e9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* 表格样式 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; font-size: 0.9em; color: #666; }
        
        /* 状态标签 */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-active { background: #d4edda; color: #155724; }
        
        /* 按钮 */
        button { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sm { padding: 4px 8px; font-size: 12px; background: var(--dark); color: white; margin-right: 5px; }
        .btn-outline { background: white; border: 1px solid #ddd; }
        .btn-outline:hover { background: #f5f5f5; }

        .form-inline { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 20px; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Corda 联盟链参与者面板</h2>
        <div>
            <span>当前用户: <strong id="user-display">---</strong></span>
            <button class="btn-outline" onclick="logout()" style="margin-left:15px;">退出</button>
        </div>
    </div>

    <div class="card">
        <h3>申请新节点</h3>
        <div class="form-inline">
            <div class="form-group">
                <label>组织 (O)</label>
                <input type="text" id="node-o" placeholder="如: MyBank">
            </div>
            <div class="form-group">
                <label>城市 (L)</label>
                <input type="text" id="node-l" placeholder="如: Beijing">
            </div>
            <div class="form-group">
                <label>国家 (C)</label>
                <input type="text" id="node-c" placeholder="如: CN">
            </div>
            <button class="btn-main" onclick="applyNode()">提交申请</button>
        </div>
    </div>

    <div class="card">
        <h3>我的申请与节点列表</h3>
        <table id="my-nodes-table">
            <thead>
                <tr>
                    <th>节点 X.500 名称</th>
                    <th>状态</th>
                    <th>RPC 连通性</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="my-nodes-list">
                <tr><td colspan="4" style="text-align:center;">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const currentUser = localStorage.getItem('auth_username');
    if (!currentUser) window.location.href = '/index.html';
    document.getElementById('user-display').innerText = currentUser;

    window.onload = () => {
        loadMyData();
    };

    // 修改后的 loadMyData 函数：直接调用新接口获取当前用户的所有申请记录
    async function loadMyData() {
        const tbody = document.getElementById('my-nodes-list');
        try {
            // 调用新增的后端接口，传入当前用户名
            const res = await fetch(`/api/nodes/applications/my?username=${currentUser}`);
            const result = await res.json();

            if (result.success) {
                tbody.innerHTML = "";
                const apps = result.data;

                if (apps.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>您尚未申请任何节点</td></tr>";
                    return;
                }

                apps.forEach(app => {
                    // 组装完整的 X.500 名称（用于显示和后续操作）
                    const x500Name = `O=${app.organization}, L=${app.locality}, C=${app.country}`;
                    let statusHtml = "";
                    let actionsHtml = "";
                    let rpcId = `rpc-${app.id}`;

                    // 根据数据库中的 status 字段决定显示内容
                    if (app.status === 'PENDING') {
                        statusHtml = `<span class="status-badge status-pending">审批中</span>`;
                        actionsHtml = `<small style="color:#999">请等待管理员审批</small>`;
                    } else if (app.status === 'APPROVED') {
                        statusHtml = `<span class="status-badge status-active">已通过</span>`;
                        // 已通过的节点显示下载按钮（未来可扩展其他操作）
                        actionsHtml = `<button class="btn-sm" onclick="downloadNode('${x500Name}')">下载安装包</button>`;
                    }

                    // 插入行
                    tbody.innerHTML += `
                        <tr>
                            <td>${x500Name}</td>
                            <td>${statusHtml}</td>
                            <td id="${rpcId}">--</td>
                            <td>${actionsHtml}</td>
                        </tr>
                    `;

                    // 如果节点已通过，检测其 RPC 连通性
                    if (app.status === 'APPROVED') {
                        checkNodeStatus(x500Name, rpcId);
                    }
                });
            } else {
                tbody.innerHTML = `<tr><td colspan='4' style='text-align:center;color:red;'>加载失败: ${result.message}</td></tr>`;
            }
        } catch (e) {
            console.error("加载列表失败", e);
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;color:red;'>服务连接失败</td></tr>";
        }
    }

    // 申请新节点
    async function applyNode() {
        const o = document.getElementById('node-o').value.trim();
        const l = document.getElementById('node-l').value.trim();
        const c = document.getElementById('node-c').value.trim();
        
        if(!o || !l || !c) return alert("请完整填写信息");

        const res = await fetch('/api/nodes/apply', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ o, l, c, applicant: currentUser })
        });
        const result = await res.json();
        if(result.success || res.ok) {
            alert("申请提交成功！");
            // 清空输入框
            document.getElementById('node-o').value = '';
            document.getElementById('node-l').value = '';
            document.getElementById('node-c').value = '';
            // 刷新列表
            loadMyData();
        } else {
            alert("申请失败: " + (result.message || "未知错误"));
        }
    }

    // 检测连通性
    async function checkNodeStatus(name, elementId) {
        try {
            const res = await fetch(`/api/corda/${encodeURIComponent(name)}/status`);
            const data = await res.json();
            const el = document.getElementById(elementId);
            if (el) {
                if(res.ok && data.status === 200) {
                    el.innerHTML = `<b style="color:var(--primary)">● 在线</b>`;
                } else {
                    el.innerHTML = `<span style="color:var(--danger)">● 离线</span>`;
                }
            }
        } catch (e) {
            const el = document.getElementById(elementId);
            if (el) el.innerHTML = `<span style="color:var(--danger)">● 离线</span>`;
        }
    }

    // 下载
    function downloadNode(name) {
        window.location.href = `/api/nodes/download/${encodeURIComponent(name)}`;
    }

    function logout() { 
        localStorage.clear(); 
        window.location.href = '/index.html'; 
    }
</script>
</body>
</html>
